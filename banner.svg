<svg width="380" height="340" viewBox="0 0 380 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow1" cx="0%" cy="0%" r="75%">
      <stop offset="0%" stop-color="#3b4cca" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#3b4cca" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="100%" cy="100%" r="75%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="btnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="380" height="340" rx="18"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cardClip)">
    <rect x="0" y="0" width="380" height="340" fill="#0a0e1a"/>
    <rect x="0" y="0" width="380" height="340" fill="url(#glow1)"/>
    <rect x="0" y="0" width="380" height="340" fill="url(#glow2)"/>
  </g>
  <rect x="0.5" y="0.5" width="379" height="339" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- 1. Name / Title -->
  <text x="32" y="64" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="26" font-weight="800" fill="#f8fafc">유원희 <tspan font-size="15" font-weight="500" fill="#c7cdf5">(Warren Yoo)</tspan></text>
  <text x="32" y="92" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="16" font-weight="600" fill="#a5b4fc">AX 마케팅 전문 컨설턴트 &amp; 강사</text>

  <line x1="32" y1="112" x2="348" y2="112" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- 2. Tagline -->
  <rect x="32" y="134" width="4" height="84" rx="2" fill="url(#btnGrad)"/>
  <text x="52" y="154" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="17" font-weight="600" fill="#e5e7ff">16년의 실전 마케팅 내공,</text>
  <text x="52" y="182" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="17" font-weight="600"><tspan fill="#e5e7ff">AI를 만나 </tspan><tspan fill="#a5b4fc" font-weight="700">기업의 실질적</tspan></text>
  <text x="52" y="210" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="17" font-weight="600"><tspan fill="#a5b4fc" font-weight="700">성과</tspan><tspan fill="#e5e7ff">로 폭발하다.</tspan></text>

  <!-- 3. CTA Button -->
  <g>
    <rect x="32" y="246" width="316" height="54" rx="13" fill="url(#btnGrad)"/>
    <text x="190" y="280" text-anchor="middle" font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif" font-size="18" font-weight="700" fill="#0a0e1a">포트폴리오 바로가기 →</text>
  </g>
</svg>
